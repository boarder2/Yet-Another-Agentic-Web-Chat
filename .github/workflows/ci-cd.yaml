name: CI / CD

on:
  pull_request:
  push:
    branches: [main, develop]
  release:
    types: [published]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: '1'
  ONNXRUNTIME_NODE_INSTALL_CUDA: skip

jobs:
  docker:
    # The image build is the single gate: app.dockerfile runs lint + tsc + next
    # build, so a PR that fails any of them fails here. Push only on
    # push-to-main/develop or release; PRs build for validation but never publish.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: boarder2/yaawc
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: app.dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    # Full Playwright suite (all projects) against the mocked `test` provider —
    # offline and deterministic. Runs on every PR and push; a failing suite
    # fails the check, so a green build is gated on passing tests.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --fetch-timeout=600000
      - run: cp sample.config.toml config.toml
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run e2e tests (full suite)
        run: npm run test:e2e
        env:
          YAAWC_TEST_MODE: 'true'
      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
