[GENERAL]
SIMILARITY_MEASURE = "cosine"
KEEP_ALIVE = "5m"
BASE_URL = ""
HIDDEN_MODELS = [ ]
PRIVATE_SESSION_DURATION_MINUTES = 1440

[GENERAL.RETENTION]
CHATS_MODE = "disabled"        # "days" | "count" | "disabled"
CHATS_VALUE = 365
SCHEDULED_RUNS_MODE = "disabled" # "days" | "count" | "disabled"
SCHEDULED_RUNS_VALUE = 10

[MODELS.OPENAI]
API_KEY = ""

[MODELS.GROQ]
API_KEY = ""

[MODELS.OPENROUTER]
API_KEY = ""

[MODELS.ANTHROPIC]
API_KEY = ""

[MODELS.GEMINI]
API_KEY = ""

[MODELS.CUSTOM_OPENAI]
API_KEY = ""
API_URL = ""
MODEL_NAME = ""

[MODELS.OLLAMA]
API_URL = ""

[MODELS.DEEPSEEK]
API_KEY = ""

[MODELS.AIMLAPI]
API_KEY = ""

[MODELS.LM_STUDIO]
API_URL = ""

[API_ENDPOINTS]
SEARXNG = ""

[SEARCH]
# Primary search provider for regular chats.
# Options: "searxng" | "brave_search" | "brave_llm" | "mojeek"
PROVIDER = "searxng"
# Optional: override provider for private chats. Leave empty to use PROVIDER.
PRIVATE_PROVIDER = ""
# Fallback provider used when the primary doesn't support a capability
# (e.g. Mojeek has no image search — fallback covers it).
FALLBACK_PROVIDER = "searxng"
# Preferred result language (ISO 639-1, e.g. "en", "fr", "de").
LANGUAGE = "en"
# Preferred region (ISO 3166-1 alpha-2 country code, e.g. "US", "GB"). Leave empty for none.
REGION = "US"

[SEARCH.PROVIDERS.SEARXNG]
API_URL = ""

[SEARCH.PROVIDERS.BRAVE_SEARCH]
API_KEY = ""

[SEARCH.PROVIDERS.BRAVE_LLM]
API_KEY = ""

[SEARCH.PROVIDERS.MOJEEK]
API_KEY = ""

[TOOLS.CODE_EXECUTION]
ENABLED = false
DOCKER_IMAGE = "node:slim"
DOCKER_HOST = "unix:///var/run/docker.sock"
TIMEOUT_SECONDS = 30
MEMORY_MB = 128
MAX_OUTPUT_CHARS = 10000
