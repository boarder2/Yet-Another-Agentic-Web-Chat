services:
  searxng:
    image: docker.io/searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - 4000:8080
    networks:
      - yaawc-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: app.dockerfile
    cap_add:
      - SYS_ADMIN # Required for Playwright sandboxing
    init: true
    environment:
      - SEARXNG_API_URL=http://searxng:8080
      - DATA_DIR=/home/yaawc/data
    ports:
      - 3000:3000
    networks:
      - yaawc-network
    volumes:
      - app-data:/home/yaawc/data # single user-data volume
      - ./config.toml:/home/yaawc/config.toml # config bind mount (unchanged)
      # Legacy: drains old uploads into app-data on first start. Remove next release.
      - uploads:/home/yaawc/uploads-legacy
      # Uncomment below to enable sandboxed code execution.
      # The app creates sibling containers on the host Docker daemon.
      # See README.md "Code Execution (Sandbox)" for permission setup.
      # - /var/run/docker.sock:/var/run/docker.sock
    # Uncomment and set DOCKER_GID to your host's docker group ID
    # (find it with: stat -c '%g' /var/run/docker.sock)
    # group_add:
    #   - "${DOCKER_GID:-999}"
    restart: unless-stopped

networks:
  yaawc-network:

volumes:
  app-data:
  uploads: # legacy, remove next release
